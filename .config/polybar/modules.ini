include-file = $XDG_CONFIG_HOME/polybar/usermodules.ini

[module/title]
type = internal/xwindow
; Available tags:
;   <label> (default)
format = <label>
;format-prefix = ﯑
format-background = ${color.b}
format-padding = 1
; Available tokens:
;   %title%
; Default: %title%
label = " %title%"
label-maxlen = 30
label-foreground = ${color.bg}
; Used instead of label when there is no window title
label-empty = " Desktop"
label-empty-foreground = ${color.bg}

[module/time]
type = internal/date
; Seconds to sleep between updates
interval = 1.0
; See "http://en.cppreference.com/w/cpp/io/manip/put_time" for details on how to format the date string
; NOTE: if you want to use syntax tags here you need to use %%{...}
;;date = %Y-%m-%d%

; Optional time format
time = "%H:%M:%S  "

; if `date-alt` or `time-alt` is defined, clicking
; the module will toggle between formats
;;date-alt = %A, %d %B %Y
time-alt = "%a, %d %b %Y  "

; Available tags:
;   <label> (default)
format = <label>
format-foreground = ${color.fg0}
format-background = ${color.y}
format-padding = 1

; Available tokens:
;   %date%
;   %time%
; Default: %date%
label = %time%

[module/network]
type = internal/network
interface = eno1

format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-packetloss = <animation-packetloss> <label-connected>

format-connected-background = ${color.w}
format-connected-foreground = ${color.fg0}
format-disconnected-background = ${color.w}
format-disconnected-foreground = ${color.fg0}
format-packetloss-background = ${color.w}
format-packetloss-foreground = ${color.fg0}

label-connected = ﯱ %downspeed:8% | %upspeed:8%
label-disconnected =  Disconnected

; Only applies if <animation-packetloss> is used
animation-packetloss-0 = ⚠
animation-packetloss-0-foreground = ${color.red2}
animation-packetloss-1 = 📶
animation-packetloss-1-foreground = ${color.bg3}
; Framerate in milliseconds
animation-packetloss-framerate = 500

[module/audio]
type = internal/alsa

; Soundcard to be used
; Usually in the format hw:# where # is the card number
; You can find the different card numbers in `/proc/asound/cards`
master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

; Name of the master, speaker and headphone mixers
; Use the following command to list available mixer controls:
; $ amixer scontrols | sed -nr "s/.*'([[:alnum:]]+)'.*/\1/p"
; If master, speaker or headphone-soundcard isn't the default, 
; use `amixer -c # scontrols` instead where # is the number 
; of the master, speaker or headphone soundcard respectively
;
; Default: Master
master-mixer = Master

; Optionally define speaker and headphone mixers
; Default: none
;;speaker-mixer = Speaker
; Default: none
;;headphone-mixer = Headphone

; NOTE: This is required if headphone_mixer is defined
; Use the following command to list available device controls
; $ amixer controls | sed -r "/CARD/\!d; s/.*=([0-9]+).*name='([^']+)'.*/printf '%3.0f: %s\n' '\1' '\2'/e" | sort
; You may also need to use `amixer -c # controls` as above for the mixer names
; Default: none
;;headphone-id = 9

; Use volume mapping (similar to amixer -M and alsamixer), where the increase in volume is linear to the ear
; Default: false
; mapped = true

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 2

; Available tags:
;   <label-volume> (default)
;   <ramp-volume>
;   <bar-volume>
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.x}
format-volume-padding = 1

; Available tags:
;   <label-muted> (default)
;   <ramp-volume>
;   <bar-volume>
format-muted = <label-muted>
format-muted-prefix = 婢
format-muted-background = ${color.x}
format-muted-padding = 0

; Available tokens:
;   %percentage% (default)
label-volume = "%percentage%% "

; Available tokens:
;   %percentage% (default
label-muted = " Muted "
label-muted-foreground = ${color.fg}

; Only applies if <ramp-volume> is used
ramp-volume-0 = 奄
ramp-volume-1 = 奔
ramp-volume-2 = 墳

; 
